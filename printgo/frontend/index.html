<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrintGo Express</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="bg"></div>

<div class="card">

  <div class="top">

    <div>
      <h1>PrintGo Express</h1>
      <p>Jasa Print Online Antar & Jemput</p>
    </div>

    <span class="close">✕</span>

  </div>

  <div class="tabs">

    <button class="active">
      Print Tugas
    </button>

    <button>
      Lacak Pesanan
    </button>

  </div>

  <div class="upload-area">

    <div class="upload-icon">
      🖨️
    </div>

    <h3>Upload File Tugas</h3>

    <p>Drag & drop file atau pilih dari perangkat</p>

    <label class="browse-btn">

      Pilih File

      <input type="file" hidden>

    </label>

    <span>
      PDF, DOCX, PPTX maksimal 10MB
    </span>

  </div>

  <div class="floating-upload">

    <div class="file-icon red"></div>

    <div class="file-info">

      <h4>Tugas_UAS.pdf</h4>

      <div class="progress">
        <div class="progress-bar"></div>
      </div>

    </div>

    <span>88%</span>

  </div>

  <div class="input-group">
    <label>Nama Lengkap</label>

    <input type="text" placeholder="Masukkan nama">
  </div>

  <div class="input-group">
    <label>Nomor WhatsApp</label>

    <input type="text" placeholder="08xxxxxxxxxx">
  </div>

  <div class="input-group">
    <label>Lokasi Antar / Jemput</label>

    <input type="text" placeholder="Kos, kelas, atau alamat">
  </div>

  <div class="grid">

    <div class="input-group">
      <label>Jenis Print</label>

      <select>
        <option>Hitam Putih</option>
        <option>Warna</option>
      </select>
    </div>

    <div class="input-group">
      <label>Jumlah Copy</label>

      <input type="number" placeholder="1">
    </div>

  </div>

  <div class="input-group">
    <label>Catatan Tambahan</label>

    <textarea placeholder="Contoh: jilid, print bolak balik, dll"></textarea>
  </div>

  <div class="bottom">

    <div class="delivery">

      <div class="avatars">

        <div class="avatar"></div>
        <div class="avatar"></div>
        <div class="avatar"></div>

      </div>

      <span>Fast Delivery Mahasiswa</span>

    </div>

    <div class="buttons">

      <button class="cancel">
        Batal
      </button>

      <button class="upload">
        Kirim Pesanan
      </button>

    </div>

  </div>

</div>

</body>
</html>
